<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MK Time - Cherish every second of your life</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Noto+Serif:ital,wght@0,100..900;1,100..900&family=Petit+Formal+Script&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
    <!-- My JS -->
    <script src="js_src.js"></script>

    <!-- Header & Navbar -->
     <div class="fixed-top showdow-sm">    
        <div id="header"></div>
        <div id="navbar"></div>
    </div>


    <!-- Main -->
    <main class="content-wrapper">
        <div class="background-login"> 
            <div class="intro">
                <h2 class="text-center mt-3" style="font-weight: bold; font-family: 'Petit Formal Script', cursive;">Login</h2>
                <h3 class="text-center" style="font-family:'noto', serif; text-shadow: 2px 2px 10px #858585;">Sign in to order</h3>
            </div>
        </div>
        <div class="row justify-content-center">
            <form class="col-md-5 col-lg-3">
                <p class="mt-4">Haven't got an account? <a class="link-normal" href="register.html">Register</a> here today.</p>  
                <div class="mb-3">
                    <label for="inputEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" id="inputEmail" placeholder="Please type your email">
                </div>
                    
                <div class="mb-3">
                    <label for="inputPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="inputPassword" placeholder="Please type your password">
                </div>
                <br>
                <div class="d-flex justify-content-around my-4">
                    
                    <button class="btn btn-add-to-cart w-100" type="button" style="border-radius: 20px">Submit</button>
                    
                </div>
            </form>
        </div>
        
        
    </main>
    <!-- Footer -->
    <div>
        <div id="footer"></div>
    </div>

</body>
</html>
